app.version=@project.version@

spring.liquibase.change-log=classpath:liquibase/change-log-master.xml

logging.level.root=INFO

# Number of days shown on the x-axis of the blood pressure and weight charts (ending today).
chart.window.days=31

# Directory in which the positions and sizes of the internal frames are persisted.
app.frame-bounds.directory=${user.home}/.health-tracker
# Pixels a newly opened frame is shifted down/right when another frame already occupies its position.
app.frame-bounds.offset=20

print.jasper.path=/home/ollie/Eclipse-Workspace/health-tracker/jasper-print/src/main/resources/jasper/src/
external.viewer.pdf.temp.filename=test.pdf
external.viewer.pdf.call.application=evince
external.viewer.pdf.call.parameters=%TEMP_PDF%

spring.datasource.url=jdbc:hsqldb:file:db/healthtracker
spring.datasource.driverClassName=org.hsqldb.jdbc.JDBCDriver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
